name: Frontend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-react # This tells GitHub where your package.json is
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: npm install
      # Add your SonarCloud and Snyk steps below this

      - name: Run tests
        run: npm test -- --passWithNoTests
